<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CID Questions 💫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="cid-mode">

  <!-- ══════════════════════════════════
       MOBILE BLOCK
  ══════════════════════════════════ -->
  <div id="mobile-block">
    <div class="mobile-inner">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="10" width="56" height="38" rx="7" stroke="#c8a96e" stroke-width="3" fill="rgba(200,169,110,0.1)"/>
        <rect x="16" y="48" width="32" height="5" rx="2.5" fill="#c8a96e" opacity=".5"/>
      </svg>
      <p>This surprise is best experienced<br/>on a laptop 💻</p>
    </div>
  </div>

  <!-- ══════════════════════════════════
       PARTICLE CANVAS
  ══════════════════════════════════ -->
  <canvas id="particle-canvas"></canvas>

  <!-- ══════════════════════════════════
       THEME TOGGLE
  ══════════════════════════════════ -->
  <div class="theme-toggle-wrap">
    <span class="theme-label">🔎 CID</span>
    <label class="toggle-switch">
      <input type="checkbox" id="theme-toggle"/>
      <span class="slider"></span>
    </label>
    <span class="theme-label">MOON 🌙</span>
  </div>

  <!-- ══════════════════════════════════
       LAYOUT
  ══════════════════════════════════ -->
  <div class="layout">

    <!-- ─── LEFT PANEL ─── -->
    <div class="panel left-panel">

      <!-- CID MODE: top logo image + nose ring showcase -->
      <div class="left-inner cid-left">
        <div class="side-img-wrap top-img">
          <img src="images/cid-logo.png" alt="CID" class="side-img cid-logo-img"/>
          <div class="img-glow cid-glow"></div>
        </div>
        <div class="nosering-showcase cid-showcase-left">
          <!-- Gold nose ring SVGs stacked -->
          <svg viewBox="0 0 100 110" class="showcase-ring sr1" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
            </linearGradient></defs>
            <path d="M50,100 A42,42 0 1,1 49.9,100" fill="none" stroke="url(#g1)" stroke-width="11" stroke-linecap="round"/>
            <circle cx="50" cy="58" r="14" fill="#f87060" stroke="#f0a500" stroke-width="2.5"/>
            <polygon points="50,49 56,58 50,65 44,58" fill="rgba(255,255,255,0.55)"/>
            <circle cx="46" cy="54" r="4" fill="rgba(255,255,255,0.45)"/>
          </svg>
          <svg viewBox="0 0 70 75" class="showcase-ring sr2" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
            </linearGradient></defs>
            <path d="M35,70 A28,28 0 1,1 34.9,70" fill="none" stroke="url(#g2)" stroke-width="8" stroke-linecap="round"/>
            <circle cx="35" cy="42" r="9" fill="#f9c74f" stroke="#f0a500" stroke-width="2"/>
            <polygon points="35,35 39,42 35,47 31,42" fill="rgba(255,255,255,0.5)"/>
          </svg>
          <svg viewBox="0 0 48 52" class="showcase-ring sr3" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
            </linearGradient></defs>
            <path d="M24,48 A18,18 0 1,1 23.9,48" fill="none" stroke="url(#g3)" stroke-width="6" stroke-linecap="round"/>
            <circle cx="24" cy="30" r="6" fill="#f9c74f" stroke="#f0a500" stroke-width="1.5"/>
          </svg>
        </div>
      </div>

      <!-- MOON MODE: moon-face top only (lady moved to right) -->
      <div class="left-inner moon-left">
        <div class="side-img-wrap top-img">
          <img src="images/moon-face.png" alt="Moon" class="side-img moon-face-img"/>
          <div class="img-glow moon-glow"></div>
        </div>
      </div>

    </div>

    <!-- ─── CENTER PANEL ─── -->
    <div class="panel center-panel">
      <main id="main-content">

        <!-- QUESTION CARD -->
        <div class="card glass-card" id="question-card">

          <!-- Nose Ring top deco -->
          <div class="card-nosering">
            <!-- CID gold ring -->
            <svg class="nosering-top cid-ring" viewBox="0 0 90 58" xmlns="http://www.w3.org/2000/svg" width="88" height="56">
              <defs><linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
              </linearGradient></defs>
              <path d="M45,54 A34,34 0 1,1 44.9,54" fill="none" stroke="url(#cg1)" stroke-width="11" stroke-linecap="round"/>
              <circle cx="45" cy="20" r="12" fill="#f87060" stroke="#f0a500" stroke-width="2.5"/>
              <polygon points="45,11 52,20 45,27 38,20" fill="rgba(255,255,255,0.6)"/>
              <circle cx="41" cy="16" r="3.5" fill="rgba(255,255,255,0.5)"/>
            </svg>
            <!-- MOON purple ring -->
            <svg class="nosering-top moon-ring" viewBox="0 0 90 58" xmlns="http://www.w3.org/2000/svg" width="88" height="56">
              <defs><linearGradient id="mg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f5f0ff"/><stop offset="50%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient></defs>
              <path d="M45,54 A34,34 0 1,1 44.9,54" fill="none" stroke="url(#mg1)" stroke-width="11" stroke-linecap="round"/>
              <circle cx="45" cy="20" r="12" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2.5"/>
              <polygon points="45,11 52,20 45,27 38,20" fill="rgba(255,255,255,0.6)"/>
              <circle cx="41" cy="16" r="3.5" fill="rgba(255,255,255,0.5)"/>
            </svg>
          </div>

          <div class="question-area">
            <p class="question-label">— 6 little questions for you —</p>
            <h1 id="main-question" class="main-question">Will you be<br/>my GF (Girl as Friend) ?</h1>
            <p id="subtext" class="subtext">Choose genuinely </p>
          </div>

          <div class="btn-group" id="btn-group">
            <button id="yes-btn" class="btn btn-yes"><span>YES 🥳</span></button>
            <button id="no-btn"  class="btn btn-no"><span>NO 😐</span></button>
          </div>
        </div>

        <!-- RESULT CARD -->
        <div class="card glass-card result-card" id="result-card">
          <div id="result-anim-area" class="result-anim-area"></div>
          <div id="result-emoji"    class="result-emoji"></div>
          <h2  id="result-message"  class="result-message"></h2>
        </div>

      </main>
    </div>

    <!-- ─── RIGHT PANEL ─── -->
    <div class="panel right-panel">
      <!-- CID right: nose ring showcase (no text label) -->
      <div class="right-inner cid-right">
        <div class="nosering-showcase cid-showcase-right">
          <svg viewBox="0 0 100 110" class="showcase-ring sr1" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
            </linearGradient></defs>
            <path d="M50,100 A42,42 0 1,1 49.9,100" fill="none" stroke="url(#r1)" stroke-width="11" stroke-linecap="round"/>
            <circle cx="50" cy="58" r="14" fill="#f87060" stroke="#f0a500" stroke-width="2.5"/>
            <polygon points="50,49 56,58 50,65 44,58" fill="rgba(255,255,255,0.55)"/>
            <circle cx="46" cy="54" r="4" fill="rgba(255,255,255,0.45)"/>
          </svg>
          <svg viewBox="0 0 70 75" class="showcase-ring sr2" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="r2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
            </linearGradient></defs>
            <path d="M35,70 A28,28 0 1,1 34.9,70" fill="none" stroke="url(#r2)" stroke-width="8" stroke-linecap="round"/>
            <circle cx="35" cy="42" r="9" fill="#f9c74f" stroke="#f0a500" stroke-width="2"/>
            <polygon points="35,35 39,42 35,47 31,42" fill="rgba(255,255,255,0.5)"/>
          </svg>
          <svg viewBox="0 0 48 52" class="showcase-ring sr3" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="r3" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#c8700a"/>
            </linearGradient></defs>
            <path d="M24,48 A18,18 0 1,1 23.9,48" fill="none" stroke="url(#r3)" stroke-width="6" stroke-linecap="round"/>
            <circle cx="24" cy="30" r="6" fill="#f9c74f" stroke="#f0a500" stroke-width="1.5"/>
          </svg>
        </div>
      </div>

      <!-- MOON right: moon-lady image — large, no black bg -->
      <div class="right-inner moon-right">
        <div class="moon-lady-wrap">
          <img src="images/moon-lady.png" alt="Moon Lady" class="moon-lady-img"/>
          <div class="moon-lady-glow"></div>
        </div>
      </div>
    </div>

  </div><!-- /.layout -->

  <script src="script.js"></script>
</body>
</html>
